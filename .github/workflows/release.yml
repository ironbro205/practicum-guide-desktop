name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 태그(vX.Y.Z)와 package.json version 불일치 시 빌드 전에 실패시킨다
      - name: verify tag matches package.json version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag v$TAG_VERSION != package.json $PKG_VERSION"
            exit 1
          fi

      # 릴리스를 미리 생성 — electron-builder 의 자산별 병렬 업로드가 릴리스 생성을
      # 경합하면 같은 태그에 릴리스가 2개 생기는 사고 방지(v1.0.0 에서 실제 발생)
      - name: pre-create release
        shell: bash
        run: gh release create "$GITHUB_REF_NAME" --title "${GITHUB_REF_NAME#v}" --notes "" --repo "$GITHUB_REPOSITORY" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 태그 푸시 → 빌드 → GitHub Releases 에 setup.exe / latest.yml / .blockmap 게시
      # (publish.releaseType: "release" — draft 는 업데이터가 못 보므로 바로 공개)
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
