name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 태그 푸시 → 빌드 → GitHub Releases 에 setup.exe / latest.yml / .blockmap 게시
      # (publish.releaseType: "release" — draft 는 업데이터가 못 보므로 바로 공개)
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
